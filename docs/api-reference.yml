          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/admin-accounts/{id}/reset-password:
    post:
      tags: [Admin]
      summary: Reset another admin's password
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 12
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/stats:
    get:
      tags: [Admin]
      summary: Get server statistics
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: Server stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:
                    type: integer
                  activeUsers:
                    type: integer
                  investigations:
                    type: integer
                  activeSessions:
                    type: integer
                  auditLogEntries24h:
                    type: integer

  /admin/api/settings:
    get:
      tags: [Admin]
      summary: Get server settings
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: Server settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverName:
                    type: string
                  registrationMode:
                    type: string
                    enum: [open, invite]
                  ttlHours:
                    type: integer
                    description: Session TTL in hours
                  maxPerUser:
                    type: integer
                    description: Max sessions per user (0 = unlimited)
                  notificationRetentionDays:
                    type: integer
                  auditLogRetentionDays:
                    type: integer
    patch:
      tags: [Admin]
      summary: Update server settings
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverName:
                  type: string
                  maxLength: 100
                registrationMode:
                  type: string
                  enum: [open, invite]
                ttlHours:
                  type: integer
                  minimum: 1
                maxPerUser:
                  type: integer
                  minimum: 0
                notificationRetentionDays:
                  type: integer
                  minimum: 1
                  maximum: 3650
                auditLogRetentionDays:
                  type: integer
                  minimum: 1
                  maximum: 3650
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  serverName:
                    type: string
                  registrationMode:
                    type: string
                  ttlHours:
                    type: integer
                  maxPerUser:
                    type: integer
                  notificationRetentionDays:
                    type: integer
                  auditLogRetentionDays:
                    type: integer
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/allowed-emails:
    get:
      tags: [Admin]
      summary: List allowed emails (invite list)
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: Allowed emails
          content:
            application/json:
              schema:
                type: object
                properties:
                  emails:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
    post:
      tags: [Admin]
      summary: Add email to allowlist
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email added
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

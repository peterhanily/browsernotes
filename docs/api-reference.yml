        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, displayName, password]
              properties:
                username:
                  type: string
                  minLength: 2
                  pattern: "^[a-zA-Z0-9._-]+$"
                displayName:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 12
      responses:
        '201':
          description: Admin account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:

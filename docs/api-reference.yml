        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmName]
              properties:
                confirmName:
                  type: string
                  description: Must match the investigation's name exactly
      responses:
        '200':
          description: Investigation purged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: object

      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

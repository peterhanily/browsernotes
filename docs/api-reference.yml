                    type: string
        '400':
          description: Invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/allowed-emails/{email}:
    delete:
      tags: [Admin]
      summary: Remove email from allowlist
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Email not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/users:
    get:
      tags: [Admin]
      summary: List all users (admin)
      description: Returns all non-bot users.
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        email:
                          type: string
                        displayName:
                          type: string
                        role:
                          type: string
                        active:
                          type: boolean
                        lastLoginAt:
                          type: string
                          format: date-time
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
    post:
      tags: [Admin]
      summary: Create user (admin)
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, displayName, password]
              properties:
                email:
                  type: string
                  format: email
                displayName:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [admin, analyst, viewer]
                  default: analyst
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      displayName:
                        type: string
                      role:
                        type: string

          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: folderId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          schema:
            type: string
          description: Search in detail and itemTitle fields
      responses:
        '200':
          description: Paginated audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userId:
                          type: string
                        userDisplayName:
                          type: string
                        userEmail:
                          type: string
                        category:
                          type: string
                        action:
                          type: string
                        detail:
                          type: string
                        itemId:
                          type: string
                          nullable: true
                        itemTitle:
                          type: string
                          nullable: true
                        folderId:
                          type: string
                          nullable: true
                        folderName:
                          type: string
                          nullable: true
                        timestamp:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer


openapi: 3.1.0
info:
  title: ThreatCaddy API
  version: 1.0.0
  description: |
    ThreatCaddy is a collaborative threat investigation platform. This API powers
    the Chrome extension and web clients, providing authentication, real-time sync,
    investigation management, a social feed ("CaddyShack"), file uploads, LLM chat,
    audit logging, notifications, user profiles, bot automation, and backups.

    **Two servers run on separate ports:**
    - **Main API** (default 3001) -- all `/api/*` and `/health` endpoints
    - **Admin API** (default 3002) -- all `/admin/*` endpoints, served on an internal-only port

servers:
  - url: http://localhost:3001
    description: Main API server (configurable via PORT env)
  - url: http://localhost:3002
    description: Admin panel server (configurable via ADMIN_PORT env)

tags:
  - name: Health
    description: Health check endpoint
  - name: Server
    description: Public server info
  - name: Auth
    description: User authentication (register, login, refresh, logout, profile)
  - name: Sync
    description: Real-time data synchronization (push/pull/snapshot)
  - name: Investigations
    description: Investigation (folder) management and membership
  - name: Feed
    description: CaddyShack social feed -- posts, replies, reactions
  - name: Files
    description: File upload and retrieval
  - name: Backups
    description: Encrypted backup upload, listing, download, and deletion
  - name: LLM
    description: LLM chat proxy with SSE streaming
  - name: Audit
    description: Activity audit log
  - name: Notifications
    description: User notifications
  - name: Users
    description: User profiles, search, feeds, and admin user management
  - name: Saved Searches
    description: Saved search management -- list, create, update, delete
  - name: Integrations
    description: Integration template sharing and management
  - name: Bots
    description: Bot automation -- CRUD, webhook, trigger, run history
  - name: Admin
    description: Admin panel -- setup, login, accounts, settings, investigations, users, bots, audit, AI assistant

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User JWT access token obtained from /api/auth/login or /api/auth/register
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT token obtained from /admin/api/login or /admin/api/bootstrap
    WebhookHMAC:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: "HMAC-SHA256 signature of the request body, prefixed with `sha256=`"
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: Raw webhook secret for simple authentication

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [admin, analyst, viewer]
        avatarUrl:
          type: string
          nullable: true

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    SyncChange:
      type: object
      properties:
        table:
          type: string
        op:
          type: string
          enum: [put, delete]
        entityId:
          type: string
        data:
          type: object
        clientVersion:
          type: integer

    SyncResult:
      type: object
      properties:
        table:
          type: string
        entityId:
          type: string
        status:
          type: string
          enum: [accepted, conflict, rejected]
        serverVersion:
          type: integer
        serverData:
          type: object
        serverRecord:
          type: object

    InvestigationMembership:
      type: object
      properties:
        folderId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        joinedAt:
          type: string
          format: date-time
        folderName:
          type: string
        folderStatus:
          type: string
        folderColor:
          type: string
        folderIcon:
          type: string

    InvestigationMember:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        joinedAt:
          type: string
          format: date-time
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true

    Post:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        content:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        folderId:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true
        replyToId:
          type: string
          nullable: true
        mentions:
          type: array
          items:
            type: string
        pinned:
          type: boolean
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        authorDisplayName:
          type: string
        authorAvatarUrl:
          type: string
          nullable: true
        reactions:
          type: object
          additionalProperties:
            type: object
            properties:
              count:
                type: integer
              userIds:
                type: array
                items:
                  type: string
        replyCount:
          type: integer

    Attachment:
      type: object
      required: [id, url, type, mimeType, filename]
      properties:
        id:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [image, video, audio, document]
        mimeType:
          type: string
        filename:
          type: string

    FileUploadResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        mimeType:
          type: string
        size:
          type: integer
        filename:
          type: string

    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        sourceUserId:
          type: string
          nullable: true
        postId:
          type: string
          nullable: true
        folderId:
          type: string
          nullable: true
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        sourceUserDisplayName:
          type: string
          nullable: true
        sourceUserAvatarUrl:
          type: string
          nullable: true

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        category:
          type: string
        action:
          type: string
        detail:
          type: string
        itemId:
          type: string
          nullable: true
        itemTitle:
          type: string
          nullable: true
        folderId:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        userDisplayName:
          type: string
        userAvatarUrl:
          type: string
          nullable: true

    Backup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [full, differential]
        scope:
          type: string
          enum: [all, investigation, entity]
        scopeId:
          type: string
          nullable: true
        entityCount:
          type: integer
        sizeBytes:
          type: integer
        parentBackupId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    BotConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        enabled:
          type: boolean
        config:
          type: object

    BotRun:
      type: object
      properties:
        id:
          type: string
        botConfigId:
          type: string
        trigger:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true

    AdminAccount:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        active:
          type: boolean

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
          enum: [connected, disconnected]
        storage:
          type: string
          enum: [accessible, inaccessible]
        timestamp:
          type: string
          format: date-time

    SavedSearch:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        query:
          type: string
        filters:
          type: object
        isShared:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IntegrationTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        template:
          type: object
          description: Full integration template definition (steps, outputs, triggers)
        sharedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  # ─── Health ──────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns DB and file-storage connectivity status.
      security: []
      responses:
        '200':
          description: All systems operational
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: One or more subsystems degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ─── Server Info ─────────────────────────────────────────────────
  /api/server/info:
    get:
      tags: [Server]
      summary: Get server info
      description: Returns public server metadata (no auth required).
      security: []
      responses:
        '200':
          description: Server info
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverName:
                    type: string

  # ─── Auth ────────────────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user account. Registration may be open or invite-only
        depending on the server's registration mode. Rate limited to 5 req/min.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, displayName, password]
              properties:
                email:
                  type: string
                  format: email
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 15
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Registration is invite-only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticates with email and password. Rate limited to 10 req/min.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Account disabled or bot account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a refresh token for a new access token + refresh token pair.
        The old refresh token is rotated (deleted). Rate limited to 20 req/min.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Invalidates the provided refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  displayName:
                    type: string
                  role:
                    type: string
                  avatarUrl:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 15
                avatarUrl:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: Changes the current user's password. Invalidates all existing sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Sync ────────────────────────────────────────────────────────
  /api/sync/push:
    post:
      tags: [Sync]
      summary: Push changes
      description: |
        Pushes an array of entity changes to the server. Each change is authorized
        against the user's investigation membership. Accepted changes are broadcast
        via WebSocket. Auto-creates owner membership for newly created folders.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [changes]
              properties:
                changes:
                  type: array
                  items:
                    $ref: '#/components/schemas/SyncChange'
      responses:
        '200':
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SyncResult'

  /api/sync/pull:
    get:
      tags: [Sync]
      summary: Pull changes since timestamp
      description: |
        Returns entities modified since the given timestamp. If folderId is specified,
        only that folder's changes are returned (requires viewer access). Otherwise,
        returns changes from all folders the user is a member of.
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: ISO timestamp to pull changes since
        - name: folderId
          in: query
          schema:
            type: string
          description: Optional folder ID to scope the pull
      responses:
        '200':
          description: Changes since the given timestamp
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      type: object
                  serverTimestamp:
                    type: string
                    format: date-time
        '400':
          description: Missing since parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No access to specified investigation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sync/snapshot/{folderId}:
    get:
      tags: [Sync]
      summary: Get full snapshot of a folder
      description: Returns all current data for a folder. Requires viewer access.
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full folder snapshot
          content:
            application/json:
              schema:
                type: object
                description: All entity data for the folder
        '403':
          description: No access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Investigations ─────────────────────────────────────────────
  /api/investigations:
    get:
      tags: [Investigations]
      summary: List user's investigations
      description: Returns all investigations the authenticated user is a member of.
      responses:
        '200':
          description: List of investigation memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvestigationMembership'

  /api/investigations/{id}:
    delete:
      tags: [Investigations]
      summary: Delete investigation
      description: Permanently deletes an investigation and all its content. Owner only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Investigation deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Not an owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Investigation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/investigations/{id}/members:
    get:
      tags: [Investigations]
      summary: List investigation members
      description: Returns all members of an investigation. Requires viewer access.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvestigationMember'
        '403':
          description: No access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Investigations]
      summary: Add member by user ID
      description: Adds a user to the investigation. Owner only. Sends notification to invited user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                role:
                  type: string
                  enum: [owner, editor, viewer]
                  default: editor
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not an owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Investigation or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/investigations/{id}/members/{userId}:
    patch:
      tags: [Investigations]
      summary: Update member role
      description: Changes a member's role in the investigation. Owner only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, editor, viewer]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not an owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Investigations]
      summary: Remove member
      description: Removes a member from the investigation. Users can remove themselves; owners can remove others.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/investigations/{id}/invite:
    post:
      tags: [Investigations]
      summary: Invite member by email
      description: Invites a user by email address. Owner only. Sends notification to invited user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [owner, editor, viewer]
                  default: editor
      responses:
        '201':
          description: User invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not an owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Investigation or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Feed (CaddyShack) ──────────────────────────────────────────
  /api/caddyshack:
    get:
      tags: [Feed]
      summary: Get paginated feed
      description: |
        Returns top-level posts in reverse chronological order.
        Optionally scoped to a folder (requires viewer access).
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: date-time
          description: Cursor for pagination (createdAt of last post)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: folderId
          in: query
          schema:
            type: string
          description: Optional folder ID to scope the feed
      responses:
        '200':
          description: Array of posts with reactions and reply counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '403':
          description: No access to folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/caddyshack/posts:
    post:
      tags: [Feed]
      summary: Create a post
      description: |
        Creates a new post or reply. Supports attachments and mentions.
        Rate limited to 30 req/min. Content max 50,000 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 50000
                attachments:
                  type: array
                  maxItems: 10
                  items:
                    $ref: '#/components/schemas/Attachment'
                mentions:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                    maxLength: 128
                folderId:
                  type: string
                  nullable: true
                parentId:
                  type: string
                  nullable: true
                  description: ID of the post being replied to
                replyToId:
                  type: string
                  nullable: true
                  description: Direct reply target (for flat threading)
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No access to investigation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Parent post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/caddyshack/posts/{id}:
    get:
      tags: [Feed]
      summary: Get post with replies
      description: Returns a post and all its flat replies with reactions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post with replies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Post'
                  - type: object
                    properties:
                      replies:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
        '403':
          description: No access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Feed]
      summary: Edit post
      description: Edits a post's content or pinned status. Author or admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  maxLength: 50000
                pinned:
                  type: boolean
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Feed]
      summary: Soft-delete post
      description: Marks a post as deleted. Author or admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/caddyshack/posts/{id}/reactions:
    post:
      tags: [Feed]
      summary: Add reaction
      description: Adds an emoji reaction to a post. One reaction per emoji per user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  maxLength: 32
      responses:
        '201':
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Invalid emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already reacted with this emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/caddyshack/posts/{id}/reactions/{emoji}:
    delete:
      tags: [Feed]
      summary: Remove reaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reaction removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  # ─── Files ──────────────────────────────────────────────────────
  /api/files/upload:
    post:
      tags: [Files]
      summary: Upload a file
      description: |
        Multipart file upload. Max 50MB. Generates thumbnails for images.
        Requires admin or analyst role. SVG uploads are blocked.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                folderId:
                  type: string
                  description: Optional investigation folder to associate the file with
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: No file, disallowed type, or SVG detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File too large (max 50MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/files/{id}:
    get:
      tags: [Files]
      summary: Download a file
      description: |
        Serves the file with appropriate Content-Type and Content-Disposition.
        Access requires investigation membership (for folder-scoped files) or
        being the uploader (for unscoped files).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: No access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/files/{id}/thumbnail:
    get:
      tags: [Files]
      summary: Download file thumbnail
      description: Serves the WebP thumbnail for an image file.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thumbnail image (WebP)
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '403':
          description: No access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Thumbnail not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Backups ─────────────────────────────────────────────────────
  /api/backups:
    post:
      tags: [Backups]
      summary: Upload encrypted backup
      description: |
        Uploads a client-encrypted backup blob with metadata.
        Max 50 backups per user. Rate limited to 5 req/min.
        Body limit 100MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata, blob]
              properties:
                metadata:
                  type: string
                  description: |
                    JSON string with fields: name (required), type (full|differential),
                    scope (all|investigation|entity), scopeId, entityCount, parentBackupId
                blob:
                  type: string
                  format: binary
                  description: Encrypted backup data
      responses:
        '201':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backup'
        '400':
          description: Missing fields, invalid metadata, or backup limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Backups]
      summary: List user's backups
      description: Returns all backups belonging to the authenticated user.
      responses:
        '200':
          description: List of backups
          content:
            application/json:
              schema:
                type: object
                properties:
                  backups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Backup'

  /api/backups/{id}:
    get:
      tags: [Backups]
      summary: Download backup
      description: Downloads the encrypted backup blob. Only accessible by the owning user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Encrypted backup data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Backups]
      summary: Delete backup
      description: Deletes a backup and its file from disk. Only accessible by the owning user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backup deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── LLM ────────────────────────────────────────────────────────
  /api/llm/chat:
    post:
      tags: [LLM]
      summary: Chat with LLM (SSE streaming)
      description: |
        Proxies a chat request to the configured LLM provider and streams
        the response via Server-Sent Events. Requires admin or analyst role.
        Rate limited to 20 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, model, messages]
              properties:
                provider:
                  type: string
                  description: LLM provider (anthropic, openai, gemini, mistral)
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                          - type: string
                          - type: array
                systemPrompt:
                  type: string
                tools:
                  type: array
      responses:
        '200':
          description: SSE stream with chunks, done, or error events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Events: { type: "chunk", content: string },
                  { type: "done", stopReason: string },
                  { type: "error", error: string }
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/llm/config:
    get:
      tags: [LLM]
      summary: Get available LLM providers
      description: Returns the list of providers with configured API keys (keys not exposed).
      responses:
        '200':
          description: Available providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        models:
                          type: array
                          items:
                            type: string

  # ─── Audit ──────────────────────────────────────────────────────
  /api/audit:
    get:
      tags: [Audit]
      summary: Query audit log
      description: |
        Returns audit log entries. Non-admin users must specify a folderId and
        be an owner of that investigation. Admin users can query without restrictions.
      parameters:
        - name: folderId
          in: query
          schema:
            type: string
          description: Required for non-admin users
        - name: userId
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogEntry'
        '400':
          description: folderId required (non-admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not an investigation owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Notifications ──────────────────────────────────────────────
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: Returns the current user's notifications, optionally filtered to unread only.
      parameters:
        - name: unread
          in: query
          schema:
            type: string
            enum: ['true']
          description: Set to "true" to return only unread notifications
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /api/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /api/notifications/read:
    delete:
      tags: [Notifications]
      summary: Delete all read notifications
      description: Permanently removes all read notifications for the current user.
      responses:
        '200':
          description: Read notifications deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: integer

  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  # ─── Users ──────────────────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List or search users
      description: |
        With `search` query: any authenticated user can search by display name or email (returns max 20 active users).
        Without `search`: requires admin role, returns full user list.
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by display name or email (case insensitive)
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    email:
                      type: string
                    displayName:
                      type: string
                    avatarUrl:
                      type: string
                      nullable: true
                    role:
                      type: string
                    active:
                      type: boolean
                    lastLoginAt:
                      type: string
                      format: date-time
                      description: Only included in admin (no-search) response
                    createdAt:
                      type: string
                      format: date-time
                      description: Only included in admin (no-search) response
        '403':
          description: Admin access required (when no search query)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  displayName:
                    type: string
                  avatarUrl:
                    type: string
                    nullable: true
                  role:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Users]
      summary: Admin update user
      description: Update a user's role, active status, or display name. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, analyst, viewer]
                active:
                  type: boolean
                displayName:
                  type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
    delete:
      tags: [Users]
      summary: Deactivate user (admin)
      description: Deactivates a user, invalidates all sessions, and disconnects WebSocket. Admin only. Cannot deactivate yourself.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Cannot deactivate yourself
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/{id}/feed:
    get:
      tags: [Users]
      summary: Get user's post timeline
      description: Returns the target user's non-deleted posts (global and investigation-scoped), filtered to ones the requesting user can access. Max 50.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User's posts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/users/{id}/likes:
    get:
      tags: [Users]
      summary: Get posts the user has liked
      description: Returns posts that the target user has reacted to, filtered by the requesting user's access. Max 50.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Liked posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

  /api/users/{id}/activity:
    get:
      tags: [Users]
      summary: Get user's recent activity
      description: Returns the target user's recent audit log entries, filtered by folder access. Max 50.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    category:
                      type: string
                    action:
                      type: string
                    detail:
                      type: string
                    itemId:
                      type: string
                      nullable: true
                    itemTitle:
                      type: string
                      nullable: true
                    folderId:
                      type: string
                      nullable: true
                    timestamp:
                      type: string
                      format: date-time

  # ─── Saved Searches ─────────────────────────────────────────────
  /api/saved-searches:
    get:
      tags: [Saved Searches]
      summary: List saved searches
      description: Returns the current user's saved searches plus shared searches.
      responses:
        '200':
          description: List of saved searches
          content:
            application/json:
              schema:
                type: object
                properties:
                  searches:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavedSearch'
    post:
      tags: [Saved Searches]
      summary: Create saved search
      description: Create a new saved search. Requires admin or analyst role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, query]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                query:
                  type: string
                  minLength: 1
                  maxLength: 5000
                filters:
                  type: object
                  default: {}
                isShared:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Saved search created
          content:
            application/json:
              schema:
                type: object
                properties:
                  search:
                    $ref: '#/components/schemas/SavedSearch'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/saved-searches/{id}:
    put:
      tags: [Saved Searches]
      summary: Update saved search
      description: Update a saved search. Only the owner can update.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, query]
              properties:
                name:
                  type: string
                query:
                  type: string
                filters:
                  type: object
                isShared:
                  type: boolean
      responses:
        '200':
          description: Updated saved search
          content:
            application/json:
              schema:
                type: object
                properties:
                  search:
                    $ref: '#/components/schemas/SavedSearch'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Saved Searches]
      summary: Delete saved search
      description: Delete a saved search. Owner or admin can delete.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Integrations ──────────────────────────────────────────────
  /api/integrations/templates:
    get:
      tags: [Integrations]
      summary: List integration templates
      description: List all shared integration templates.
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationTemplate'
    post:
      tags: [Integrations]
      summary: Share integration template
      description: Share an integration template with the team. Requires admin or analyst role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template]
              properties:
                template:
                  type: object
                  required: [name, steps, outputs]
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 200
                    description:
                      type: string
                      maxLength: 2000
                    steps:
                      type: array
                      items:
                        type: object
                    outputs:
                      oneOf:
                        - type: array
                          items:
                            type: object
                        - type: object
                    triggers:
                      type: array
                      items:
                        type: object
      responses:
        '201':
          description: Template shared
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/IntegrationTemplate'
        '400':
          description: Invalid template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/templates/{id}:
    get:
      tags: [Integrations]
      summary: Get integration template
      description: Get a single integration template by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/IntegrationTemplate'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Integrations]
      summary: Delete integration template
      description: Delete a shared integration template. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Bots ───────────────────────────────────────────────────────
  /api/bots:
    get:
      tags: [Bots]
      summary: List all bots
      description: Requires admin or analyst role.
      responses:
        '200':
          description: Bot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bots:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotConfig'
    post:
      tags: [Bots]
      summary: Create a new bot
      description: Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Bot creation payload (validated by bot-service)
      responses:
        '201':
          description: Bot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  bot:
                    $ref: '#/components/schemas/BotConfig'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}:
    get:
      tags: [Bots]
      summary: Get bot config
      description: Requires admin or analyst role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot config
          content:
            application/json:
              schema:
                type: object
                properties:
                  bot:
                    $ref: '#/components/schemas/BotConfig'
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Bots]
      summary: Update bot config
      description: Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Bot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Bots]
      summary: Delete bot
      description: Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}/enable:
    post:
      tags: [Bots]
      summary: Enable bot
      description: Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  enabled:
                    type: boolean
                    const: true
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}/disable:
    post:
      tags: [Bots]
      summary: Disable bot
      description: Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  enabled:
                    type: boolean
                    const: false
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}/trigger:
    post:
      tags: [Bots]
      summary: Manually trigger bot
      description: Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Bot error (e.g., not enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}/webhook:
    post:
      tags: [Bots]
      summary: Webhook endpoint
      description: |
        Receives webhook events for a bot. Authenticated via HMAC-SHA256 signature
        (X-Webhook-Signature header with `sha256=` prefix) or raw secret
        (X-Webhook-Secret header). No Bearer token required.
        Rate limited to 30 req/min.
      security:
        - WebhookHMAC: []
        - WebhookSecret: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Webhook payload (passed to bot execution)
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid webhook secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/bots/{id}/runs:
    get:
      tags: [Bots]
      summary: Get bot run history
      description: Requires admin or analyst role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Run history
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotRun'

  /api/bots/{id}/runs/{runId}:
    get:
      tags: [Bots]
      summary: Get bot run detail
      description: Requires admin or analyst role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/BotRun'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Admin Panel (port 3002) ────────────────────────────────────

  /admin:
    get:
      tags: [Admin]
      summary: Admin panel HTML page
      description: Returns the admin panel SPA. Sets CSP headers with a nonce.
      security: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: HTML page

  /admin/api/setup-status:
    get:
      tags: [Admin]
      summary: Check if admin accounts exist
      description: Used by the admin UI to decide whether to show the login or setup form.
      security: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasAdminAccounts:
                    type: boolean

  /admin/api/bootstrap:
    post:
      tags: [Admin]
      summary: Create first admin account
      description: Uses the bootstrap secret (from ADMIN_SECRET env var) to create the first admin account.
      security: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bootstrapSecret, username, displayName, password]
              properties:
                bootstrapSecret:
                  type: string
                username:
                  type: string
                  minLength: 2
                  pattern: "^[a-zA-Z0-9._-]+$"
                displayName:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 12
      responses:
        '200':
          description: Admin account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin:
                    $ref: '#/components/schemas/AdminAccount'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid bootstrap secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/login:
    post:
      tags: [Admin]
      summary: Admin login
      description: Authenticates admin user. Rate limited to 5 req/min.
      security: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin:
                    $ref: '#/components/schemas/AdminAccount'
        '400':
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/admin-accounts:
    get:
      tags: [Admin]
      summary: List admin accounts
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      responses:
        '200':
          description: Admin accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array

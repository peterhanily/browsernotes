      responses:
        '200':
          description: AI settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  localEndpoint:
                    type: string
                  localApiKey:
                    type: string
                    description: Masked as "***configured***" if set
                  localModelName:
                    type: string
                  customSystemPrompt:
                    type: string
                  defaultProvider:
                    type: string
                  defaultModel:
                    type: string
                  temperature:
                    type: number
    patch:
      tags: [Admin]
      summary: Update AI assistant settings
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                localEndpoint:
                  type: string
                  description: Must start with http:// or https://
                localApiKey:
                  type: string
                localModelName:
                  type: string
                customSystemPrompt:
                  type: string
                defaultProvider:
                  type: string
                defaultModel:
                  type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/ai/chat:
    post:
      tags: [Admin]
      summary: Admin AI assistant chat (SSE with tool use)
      description: |
        Multi-turn AI assistant with tool use (agentic loop). Streams responses via SSE.
        Supports Anthropic, OpenAI, Gemini, Mistral, and local providers.
        Max 50 messages, max 20 tool calls per request.
      security:
        - AdminBearerAuth: []
      servers:
        - url: http://localhost:3002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        type: string
                provider:
                  type: string
                  description: Override default provider
                model:
                  type: string
                  description: Override default model
      responses:
        '200':
          description: |
            SSE stream with events:
            - `{ type: "provider", provider, model }` -- selected provider info
            - `{ type: "text", text }` -- text response chunks
            - `{ type: "tool_call", name, input, requiresConfirm }` -- tool invocation
            - `{ type: "tool_result", name, result }` -- tool result
            - `{ type: "tool_error", name, error }` -- tool error
            - `{ type: "done", stopReason }` -- completion
            - `{ type: "error", error }` -- fatal error
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Missing or invalid messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: No AI provider configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

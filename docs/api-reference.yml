                    $ref: '#/components/schemas/AdminAccount'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/api/admin-accounts/{id}:
    patch:
      tags: [Admin]
      summary: Update admin account
